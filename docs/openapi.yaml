openapi: 3.0.3
info:
  title: SoundMarket Backend API
  version: 0.2.0
servers:
  - url: http://localhost:8080/api/v1
paths:
  /auth/register:
    post:
      summary: Register customer or engineer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/me:
    get:
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
  /users/me:
    get:
      summary: Alias for current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
  /profiles/me:
    get:
      summary: Get current profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current profile
    put:
      summary: Update current profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Updated profile
  /profiles/{id}:
    get:
      summary: Get public profile
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Public profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
  /profiles/{id}/cards:
    get:
      summary: List public cards by profile owner
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/CardTypeQuery'
        - $ref: '#/components/parameters/KindQuery'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/TagQuery'
        - $ref: '#/components/parameters/MinPriceQuery'
        - $ref: '#/components/parameters/MaxPriceQuery'
        - $ref: '#/components/parameters/SortByQuery'
        - $ref: '#/components/parameters/SortOrderQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Public cards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardListResponse'
  /profiles/{id}/reviews:
    get:
      summary: List public verified reviews about user
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Public reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
  /chats:
    get:
      summary: List user conversations
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conversation'
  /cards:
    get:
      summary: List cards
      parameters:
        - $ref: '#/components/parameters/CardTypeQuery'
        - $ref: '#/components/parameters/KindQuery'
        - $ref: '#/components/parameters/AuthorIDQuery'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/TagQuery'
        - $ref: '#/components/parameters/MinPriceQuery'
        - $ref: '#/components/parameters/MaxPriceQuery'
        - $ref: '#/components/parameters/SortByQuery'
        - $ref: '#/components/parameters/SortOrderQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Cards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardListResponse'
    post:
      summary: Create card
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardRequest'
      responses:
        '201':
          description: Card created
  /cards/{id}:
    get:
      summary: Get card by id
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
    put:
      summary: Update card
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardRequest'
      responses:
        '200':
          description: Card updated
  /cards/{id}/media/preview:
    post:
      summary: Upload public preview media for card
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Preview uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaFile'
  /cards/{id}/media/full:
    post:
      summary: Upload private full media for card
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Full media uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaFile'
  /cards/{id}/download:
    get:
      summary: Get signed URL for full card media
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Signed URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadResponse'
  /requests/{id}/bids:
    get:
      summary: List bids for request
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Bids
    post:
      summary: Create bid for request
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BidRequest'
      responses:
        '201':
          description: Bid created
  /orders/from-offer:
    post:
      summary: Create order directly from offer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferOrderRequest'
      responses:
        '201':
          description: Order created
  /orders/from-bid:
    post:
      summary: Create order from selected bid
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BidOrderRequest'
      responses:
        '201':
          description: Order created
  /orders/{id}:
    get:
      summary: Get order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Order
  /orders/{id}/messages:
    get:
      summary: List order chat messages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: before_id
          schema:
            type: string
      responses:
        '200':
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatMessage'
    post:
      summary: Send order chat message
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessageCreateRequest'
      responses:
        '201':
          description: Message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessage'
  /orders/{id}/messages/read:
    post:
      summary: Mark order chat as read
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Chat marked as read
  /orders/{id}/status:
    patch:
      summary: Update order status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusRequest'
      responses:
        '200':
          description: Order updated
  /orders/{id}/reviews:
    post:
      summary: Create verified review for completed order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
      responses:
        '201':
          description: Review created
  /orders/{id}/deliverables:
    get:
      summary: List private order deliverables
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Deliverables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Deliverable'
    post:
      summary: Upload new private deliverable version for order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Deliverable uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deliverable'
  /orders/{id}/deliverables/{deliverable_id}/download:
    get:
      summary: Get signed URL for private order deliverable
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
        - in: path
          name: deliverable_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Signed URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadResponse'
  /orders/{id}/dispute:
    get:
      summary: Get dispute for order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Dispute
    post:
      summary: Open dispute for order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenDisputeRequest'
      responses:
        '201':
          description: Dispute opened
  /orders/{id}/dispute/close:
    post:
      summary: Close dispute for order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseDisputeRequest'
      responses:
        '200':
          description: Dispute closed
  /payments/deposits:
    post:
      summary: Create external deposit payment session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepositRequest'
      responses:
        '201':
          description: Payment session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
  /payments/webhook:
    post:
      summary: Process provider webhook and create deposit in internal ledger on succeeded payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentWebhookResponse'
  /notifications:
    get:
      summary: List notifications
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: before_id
          schema:
            type: string
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
  /notifications/read:
    post:
      summary: Mark notifications as read, or mark all when ids omitted
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationsReadRequest'
      responses:
        '200':
          description: Notifications updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
  /payments/sync:
    post:
      summary: Dev-only manual sync of YooKassa payment status into internal ledger
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentSyncRequest'
      responses:
        '200':
          description: Payment sync processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentWebhookResponse'
  /payments/balance:
    get:
      summary: Get internal balance
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Balance
  /ws/orders/{id}:
    get:
      summary: Open realtime websocket for order chat
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '101':
          description: WebSocket upgraded
  /ws/notifications:
    get:
      summary: Open realtime websocket for notifications
      security:
        - bearerAuth: []
      responses:
        '101':
          description: WebSocket upgraded
  /admin/users:
    get:
      summary: List users for moderation
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [customer, engineer, admin]
        - in: query
          name: status
          schema:
            type: string
            enum: [active, suspended]
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
  /admin/users/{id}:
    get:
      summary: Get user for moderation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /admin/users/{id}/suspend:
    post:
      summary: Suspend user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModerationReasonRequest'
      responses:
        '200':
          description: Suspended user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /admin/users/{id}/unsuspend:
    post:
      summary: Unsuspend user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModerationReasonRequest'
      responses:
        '200':
          description: Active user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /admin/cards:
    get:
      summary: List cards for moderation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CardTypeQuery'
        - $ref: '#/components/parameters/KindQuery'
        - $ref: '#/components/parameters/AuthorIDQuery'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/TagQuery'
        - $ref: '#/components/parameters/MinPriceQuery'
        - $ref: '#/components/parameters/MaxPriceQuery'
        - $ref: '#/components/parameters/SortByQuery'
        - $ref: '#/components/parameters/SortOrderQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - in: query
          name: visibility
          schema:
            type: string
            enum: [visible, hidden]
        - in: query
          name: is_published
          schema:
            type: boolean
      responses:
        '200':
          description: Cards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardListResponse'
  /admin/cards/{id}:
    get:
      summary: Get card for moderation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
  /admin/cards/{id}/hide:
    post:
      summary: Hide card from public listing
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModerationReasonRequest'
      responses:
        '200':
          description: Hidden card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
  /admin/cards/{id}/unhide:
    post:
      summary: Restore hidden card
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModerationReasonRequest'
      responses:
        '200':
          description: Visible card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
  /admin/disputes:
    get:
      summary: List disputes for moderation
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [open, closed]
      responses:
        '200':
          description: Disputes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dispute'
  /admin/disputes/{id}:
    get:
      summary: Get dispute for moderation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Dispute
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispute'
  /admin/disputes/{id}/close:
    post:
      summary: Close dispute as admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCloseDisputeRequest'
      responses:
        '200':
          description: Closed dispute
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispute'
  /admin/actions:
    get:
      summary: List moderation audit trail actions
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: target_type
          schema:
            type: string
            enum: [user, card, dispute]
        - in: query
          name: target_id
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Moderation actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModerationAction'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ID:
      in: path
      name: id
      required: true
      schema:
        type: string
    CardTypeQuery:
      in: query
      name: card_type
      schema:
        type: string
        enum: [offer, request]
    KindQuery:
      in: query
      name: kind
      schema:
        type: string
        enum: [product, service]
    AuthorIDQuery:
      in: query
      name: author_id
      schema:
        type: string
    SearchQuery:
      in: query
      name: q
      schema:
        type: string
    TagQuery:
      in: query
      name: tag
      schema:
        type: string
    MinPriceQuery:
      in: query
      name: min_price
      schema:
        type: integer
        format: int64
    MaxPriceQuery:
      in: query
      name: max_price
      schema:
        type: integer
        format: int64
    SortByQuery:
      in: query
      name: sort_by
      schema:
        type: string
        enum: [created_at, price]
    SortOrderQuery:
      in: query
      name: sort_order
      schema:
        type: string
        enum: [asc, desc]
    LimitQuery:
      in: query
      name: limit
      schema:
        type: integer
    OffsetQuery:
      in: query
      name: offset
      schema:
        type: integer
  schemas:
    AuthRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
          enum: [customer, engineer]
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
        profile:
          $ref: '#/components/schemas/Profile'
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
        is_suspended:
          type: boolean
        suspension_reason:
          type: string
        suspended_at:
          type: string
          format: date-time
    Profile:
      type: object
      properties:
        user_id:
          type: string
        display_name:
          type: string
        bio:
          type: string
        rating:
          type: number
          format: double
        reviews_count:
          type: integer
    Card:
      type: object
      properties:
        id:
          type: string
        author_id:
          type: string
        card_type:
          type: string
          enum: [offer, request]
        kind:
          type: string
          enum: [product, service]
        title:
          type: string
        description:
          type: string
        price:
          type: integer
          format: int64
        tags:
          type: array
          items:
            type: string
        preview_urls:
          type: array
          items:
            type: string
        is_published:
          type: boolean
        is_hidden:
          type: boolean
        moderation_reason:
          type: string
        created_at:
          type: string
          format: date-time
    CardListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Card'
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer
    MediaFile:
      type: object
      properties:
        id:
          type: string
        card_id:
          type: string
        owner_user_id:
          type: string
        file_key:
          type: string
        original_filename:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
          format: int64
