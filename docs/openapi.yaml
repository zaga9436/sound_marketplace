openapi: 3.0.3
info:
  title: SoundMarket Backend API
  version: 0.2.0
servers:
  - url: http://localhost:8080/api/v1
paths:
  /auth/register:
    post:
      summary: Register customer or engineer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/me:
    get:
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
  /users/me:
    get:
      summary: Alias for current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
  /profiles/me:
    get:
      summary: Get current profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current profile
    put:
      summary: Update current profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Updated profile
  /profiles/{id}:
    get:
      summary: Get public profile
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Public profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
  /profiles/{id}/cards:
    get:
      summary: List public cards by profile owner
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Public cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Card'
  /profiles/{id}/reviews:
    get:
      summary: List public verified reviews about user
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Public reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
  /cards:
    get:
      summary: List cards
      parameters:
        - in: query
          name: card_type
          schema:
            type: string
            enum: [offer, request]
        - in: query
          name: q
          schema:
            type: string
      responses:
        '200':
          description: Cards
    post:
      summary: Create card
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardRequest'
      responses:
        '201':
          description: Card created
  /cards/{id}:
    get:
      summary: Get card by id
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Card
    put:
      summary: Update card
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardRequest'
      responses:
        '200':
          description: Card updated
  /requests/{id}/bids:
    get:
      summary: List bids for request
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Bids
    post:
      summary: Create bid for request
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BidRequest'
      responses:
        '201':
          description: Bid created
  /orders/from-offer:
    post:
      summary: Create order directly from offer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferOrderRequest'
      responses:
        '201':
          description: Order created
  /orders/from-bid:
    post:
      summary: Create order from selected bid
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BidOrderRequest'
      responses:
        '201':
          description: Order created
  /orders/{id}:
    get:
      summary: Get order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Order
  /orders/{id}/status:
    patch:
      summary: Update order status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusRequest'
      responses:
        '200':
          description: Order updated
  /orders/{id}/reviews:
    post:
      summary: Create verified review for completed order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
      responses:
        '201':
          description: Review created
  /orders/{id}/dispute:
    get:
      summary: Get dispute for order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Dispute
    post:
      summary: Open dispute for order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenDisputeRequest'
      responses:
        '201':
          description: Dispute opened
  /orders/{id}/dispute/close:
    post:
      summary: Close dispute for order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseDisputeRequest'
      responses:
        '200':
          description: Dispute closed
  /payments/deposits:
    post:
      summary: Create mock deposit payment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepositRequest'
      responses:
        '201':
          description: Deposit created
  /payments/webhook:
    post:
      summary: Mark mock YooKassa payment as succeeded and create internal deposit transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookRequest'
      responses:
        '200':
          description: Payment processed
  /payments/balance:
    get:
      summary: Get internal balance
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Balance
  /ws/orders/{id}:
    get:
      summary: Get placeholder websocket metadata for order chat
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Chat bootstrap payload
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ID:
      in: path
      name: id
      required: true
      schema:
        type: string
  schemas:
    AuthRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
          enum: [customer, engineer]
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
        profile:
          $ref: '#/components/schemas/Profile'
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
    Profile:
      type: object
      properties:
        user_id:
          type: string
        display_name:
          type: string
        bio:
          type: string
        rating:
          type: number
          format: double
        reviews_count:
          type: integer
    Card:
      type: object
      properties:
        id:
          type: string
        author_id:
          type: string
        card_type:
          type: string
          enum: [offer, request]
        kind:
          type: string
          enum: [product, service]
        title:
          type: string
        description:
          type: string
        price:
          type: integer
          format: int64
        tags:
          type: array
          items:
            type: string
        is_published:
          type: boolean
        created_at:
          type: string
          format: date-time
    Review:
      type: object
      properties:
        id:
          type: string
        order_id:
          type: string
        author_id:
          type: string
        target_user_id:
          type: string
        rating:
          type: integer
        text:
          type: string
        created_at:
          type: string
          format: date-time
    ReviewCreateRequest:
      type: object
      required: [rating, text]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
    ProfileUpdateRequest:
      type: object
      required: [display_name, bio]
      properties:
        display_name:
          type: string
        bio:
          type: string
    CardRequest:
      type: object
      required: [card_type, kind, title, description, price]
      properties:
        card_type:
          type: string
          enum: [offer, request]
        kind:
          type: string
          enum: [product, service]
        title:
          type: string
        description:
          type: string
        price:
          type: integer
          format: int64
        tags:
          type: array
          items:
            type: string
        is_published:
          type: boolean
    BidRequest:
      type: object
      required: [price, message]
      properties:
        price:
          type: integer
          format: int64
        message:
          type: string
    OfferOrderRequest:
      type: object
      required: [card_id]
      properties:
        card_id:
          type: string
    BidOrderRequest:
      type: object
      required: [bid_id]
      properties:
        bid_id:
          type: string
    OrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [created, on_hold, in_progress, review, completed, dispute, cancelled]
    OpenDisputeRequest:
      type: object
      properties:
        reason:
          type: string
        message:
          type: string
    CloseDisputeRequest:
      type: object
      required: [resolution]
      properties:
        resolution:
          type: string
          enum: [complete_order, cancel_order]
        message:
          type: string
    DepositRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: integer
          format: int64
    PaymentWebhookRequest:
      type: object
      required: [external_id]
      properties:
        external_id:
          type: string
